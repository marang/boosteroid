name: Update Flathub manifest for Boosteroid

on:
  schedule:
    - cron: "17 3 * * *" # every day at 03:17 UTC
  workflow_dispatch:

jobs:
  sync-manifest:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout this repository
        uses: actions/checkout@v4

      - name: Update manifest from upstream Deb
        id: sync
        run: |
          ./scripts/sync-latest.sh --check --skip-reinstall
          if git diff --quiet -- io.github.marang.boosteroid.yml; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout Flathub fork branch
        if: steps.sync.outputs.changed == 'true'
        uses: actions/checkout@v4
        with:
          repository: marang/flathub
          path: flathub
          token: ${{ secrets.FLATHUB_TOKEN }}
          ref: new-pr
          fetch-depth: 0

      - name: Sync manifest into flathub and push
        if: steps.sync.outputs.changed == 'true'
        env:
          FLATHUB_TOKEN: ${{ secrets.FLATHUB_TOKEN }}
        run: |
          cp io.github.marang.boosteroid.yml flathub/io.github.marang.boosteroid.yml
          cd flathub
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add io.github.marang.boosteroid.yml
          if git diff --cached --quiet; then
            echo "No manifest changes to push."
            exit 0
          fi
          git commit -m "chore: update Boosteroid extra-data checksums"
          git push origin new-pr
